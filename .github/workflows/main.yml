name: Build ESXi Unlocker on macOS

# 触发条件：
on:
  # 1. 手动触发（你要的手动构建）
  workflow_dispatch:

  # 2. 推送 v*.*.* 标签时自动构建发布（语义化版本）
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    # 在 macOS 最新版运行器执行
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build unlocker
        run: |
          python esxi-build.py

      - name: List built files
        run: |
          ls -la *.tgz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: esxi-unlocker-build
          path: '*.tgz'

      # 标签推送时：创建 GitHub Release 并上传文件
      - name: Create Release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.tgz'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
